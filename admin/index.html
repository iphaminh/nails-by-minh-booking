<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minh's Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--gold:#c9a87c;--bg:#f7f5f2;--white:#fff;--text:#1a1a1a;--text2:#666;--text3:#999;--border:#e4e0da;--radius:10px;}
    body{font-family:'Jost',sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
    /* LOGIN */
    #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .login-box{background:var(--white);border-radius:16px;padding:2rem;max-width:360px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
    .login-brand{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;margin-bottom:4px}
    .login-brand em{color:var(--gold);font-style:normal}
    .login-sub{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:1.5rem}
    .login-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:5px}
    .login-inp{width:100%;border:0.5px solid var(--border);border-radius:var(--radius);padding:11px 13px;font-size:14px;font-family:'Jost',sans-serif;outline:none;margin-bottom:14px;-webkit-appearance:none}
    .login-inp:focus{border-color:var(--gold)}
    .login-btn{width:100%;background:#111;color:#f5f0ea;border:none;border-radius:var(--radius);padding:13px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Jost',sans-serif;letter-spacing:0.5px}
    .login-err{font-size:12px;color:#dc2626;margin-top:8px;display:none}
    /* DASHBOARD */
    #dashboard{display:none}
    .top-bar{background:#111;padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center}
    .top-brand{font-family:'Cormorant Garamond',serif;font-size:20px;color:#f5f0ea}
    .top-brand em{color:var(--gold);font-style:normal}
    .top-right{display:flex;align-items:center;gap:12px}
    .logout-btn{font-size:11px;color:#888;cursor:pointer;letter-spacing:0.5px;background:none;border:none;font-family:'Jost',sans-serif}
    .logout-btn:hover{color:#f5f0ea}
    .content{max-width:960px;margin:0 auto;padding:1.5rem}
    /* STATS */
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1.5rem}
    .stat{background:var(--white);border-radius:var(--radius);padding:1rem 1.25rem;border:0.5px solid var(--border)}
    .stat-num{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:500;color:var(--text)}
    .stat-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-top:2px}
    /* FILTERS */
    .filters{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
    .filter-btn{border:0.5px solid var(--border);border-radius:20px;padding:6px 14px;font-size:11px;cursor:pointer;background:var(--white);color:var(--text2);font-family:'Jost',sans-serif;transition:all 0.15s}
    .filter-btn.act{background:#111;color:#fff;border-color:#111}
    /* BOOKINGS TABLE */
    .bookings-wrap{background:var(--white);border-radius:var(--radius);border:0.5px solid var(--border);overflow:hidden}
    .booking-row{padding:14px 16px;border-bottom:0.5px solid var(--border);display:grid;grid-template-columns:1fr 1fr auto;gap:12px;align-items:start}
    .booking-row:last-child{border-bottom:none}
    .booking-row:hover{background:var(--bg)}
    .bk-name{font-size:14px;font-weight:500;color:var(--text)}
    .bk-service{font-size:12px;color:var(--text2);margin-top:2px}
    .bk-addons{font-size:11px;color:var(--text3);margin-top:1px}
    .bk-dt{font-size:13px;color:var(--text);font-weight:500}
    .bk-phone{font-size:12px;color:var(--text2);margin-top:2px}
    .bk-inspo{font-size:11px;color:var(--gold);margin-top:2px}
    .bk-notes{font-size:11px;color:var(--text3);margin-top:4px;padding:6px 8px;background:var(--bg);border-radius:6px;line-height:1.4}
    .status-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;letter-spacing:0.5px;text-transform:uppercase;font-weight:500}
    .status-pending{background:#fef9ec;color:#b45309}
    .status-confirmed{background:#f0fdf4;color:#166534}
    .status-cancelled{background:#fef2f2;color:#991b1b}
    .status-completed{background:#f0f9ff;color:#0369a1}
    .action-btns{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
    .act-btn{font-size:10px;padding:4px 10px;border-radius:6px;cursor:pointer;border:0.5px solid var(--border);background:var(--white);color:var(--text2);font-family:'Jost',sans-serif;white-space:nowrap;transition:all 0.15s}
    .act-btn:hover{border-color:var(--gold);color:var(--text)}
    .act-btn.confirm{background:#111;color:#fff;border-color:#111}
    .act-btn.confirm:hover{opacity:0.8}
    .empty{padding:3rem;text-align:center;color:var(--text3);font-size:13px}
    .loading{padding:2rem;text-align:center;color:var(--text3);font-size:13px}
    .full-col{grid-column:1/-1}
    @media(max-width:600px){
      .booking-row{grid-template-columns:1fr;gap:8px}
      .action-btns{flex-direction:row;flex-wrap:wrap}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-brand">Nails by <em>Minh</em></div>
    <div class="login-sub">Admin dashboard</div>
    <label class="login-label">Password</label>
    <input class="login-inp" type="password" id="pw-input" placeholder="Enter your admin password" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Log in →</button>
    <div class="login-err" id="login-err">Incorrect password. Try again.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="top-bar">
    <div class="top-brand">Nails by <em>Minh</em> — Admin</div>
    <div class="top-right">
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>
  </div>
  <div class="content">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total bookings</div></div>
      <div class="stat"><div class="stat-num" id="stat-today">—</div><div class="stat-label">Today</div></div>
      <div class="stat"><div class="stat-num" id="stat-upcoming">—</div><div class="stat-label">Upcoming</div></div>
      <div class="stat"><div class="stat-num" id="stat-pending">—</div><div class="stat-label">Needs confirm</div></div>
    </div>
    <div class="filters">
      <div class="filter-btn act" onclick="setFilter('all',this)">All</div>
      <div class="filter-btn" onclick="setFilter('pending',this)">Pending</div>
      <div class="filter-btn" onclick="setFilter('confirmed',this)">Confirmed</div>
      <div class="filter-btn" onclick="setFilter('completed',this)">Completed</div>
      <div class="filter-btn" onclick="setFilter('cancelled',this)">Cancelled</div>
    </div>
    <div class="bookings-wrap" id="bookings-list">
      <div class="loading">Loading bookings...</div>
    </div>
  </div>
</div>

<script>
  let adminKey = '';
  let allBookings = [];
  let activeFilter = 'all';
  const today = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  function login() {
    const pw = document.getElementById('pw-input').value;
    if (!pw) return;
    adminKey = pw;
    loadBookings();
  }

  function logout() {
    adminKey = '';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('pw-input').value = '';
  }

  async function loadBookings() {
    try {
      const r = await fetch('/api/admin/bookings', {
        headers: { 'x-admin-key': adminKey }
      });
      if (r.status === 401) {
        document.getElementById('login-err').style.display = 'block';
        return;
      }
      const data = await r.json();
      allBookings = data.bookings || [];
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('login-err').style.display = 'none';
      updateStats();
      renderBookings();
    } catch(e) {
      document.getElementById('login-err').textContent = 'Connection error. Try again.';
      document.getElementById('login-err').style.display = 'block';
    }
  }

  function updateStats() {
    const todayStr = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    document.getElementById('stat-total').textContent = allBookings.length;
    document.getElementById('stat-today').textContent = allBookings.filter(b => b.booking_date.includes(new Date().getDate())).length;
    document.getElementById('stat-upcoming').textContent = allBookings.filter(b => b.status !== 'cancelled' && b.status !== 'completed').length;
    document.getElementById('stat-pending').textContent = allBookings.filter(b => b.status === 'pending').length;
  }

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('act'));
    btn.classList.add('act');
    renderBookings();
  }

  function renderBookings() {
    const list = document.getElementById('bookings-list');
    let filtered = activeFilter === 'all' ? allBookings : allBookings.filter(b => b.status === activeFilter);
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">No bookings found.</div>';
      return;
    }
    list.innerHTML = filtered.map(b => `
      <div class="booking-row" id="row-${b.id}">
        <div>
          <div class="bk-name">${b.client_name}</div>
          <div class="bk-service">${b.service}</div>
          ${b.addons ? `<div class="bk-addons">+ ${b.addons}</div>` : ''}
          ${b.inspo_style ? `<div class="bk-inspo">💅 ${b.inspo_style}</div>` : ''}
          ${b.notes ? `<div class="bk-notes">📝 ${b.notes}</div>` : ''}
        </div>
        <div>
          <div class="bk-dt">${b.booking_date}</div>
          <div class="bk-phone">${b.booking_time}</div>
          <div class="bk-phone" style="margin-top:4px">📞 ${b.client_phone}</div>
          ${b.client_email ? `<div class="bk-phone">✉️ ${b.client_email}</div>` : ''}
          <div style="margin-top:6px"><span class="status-badge status-${b.status}">${b.status}</span></div>
          <div style="font-size:10px;color:var(--text3);margin-top:4px">${new Date(b.created_at).toLocaleDateString()}</div>
        </div>
        <div class="action-btns">
          ${b.status === 'pending' ? `<button class="act-btn confirm" onclick="updateStatus('${b.id}','confirmed')">Confirm</button>` : ''}
          ${b.status === 'confirmed' ? `<button class="act-btn" onclick="updateStatus('${b.id}','completed')">Done ✓</button>` : ''}
          ${b.status !== 'cancelled' && b.status !== 'completed' ? `<button class="act-btn" onclick="updateStatus('${b.id}','cancelled')">Cancel</button>` : ''}
        </div>
      </div>
    `).join('');
  }

  async function updateStatus(id, status) {
    try {
      await fetch('/api/admin/bookings', {
        method: 'PATCH',
        headers: { 'x-admin-key': adminKey, 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, status })
      });
      allBookings = allBookings.map(b => b.id === id ? { ...b, status } : b);
      updateStats();
      renderBookings();
    } catch(e) { alert('Error updating booking. Try again.'); }
  }

  // Auto-refresh every 60 seconds
  setInterval(() => { if (adminKey) loadBookings(); }, 60000);
</script>
</body>
</html>
